<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Asistente Ciborg 347</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: transparent;
      color: #e0e6ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    
    .asistente-container {
      max-width: 100%;
      width: 100%;
      margin: 0 auto;
      background: linear-gradient(135deg, rgba(12, 12, 20, 0.96), rgba(8, 8, 14, 0.98));
      backdrop-filter: blur(20px);
      border-radius: 0;
      border: none;
      overflow: hidden;
      box-shadow: none;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .asistente-header {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.12), rgba(139, 92, 246, 0.12));
      padding: 20px 24px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.15);
      text-align: center;
      position: relative;
      flex-shrink: 0;
    }
    
    .asistente-header h2 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }
    
    .asistente-header p {
      font-size: 0.75rem;
      color: #8b9dff;
      opacity: 0.8;
    }
    
    .asistente-header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 20%;
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00d4ff, #c084fc, transparent);
      border-radius: 2px;
    }
    
    .asistente-body {
      padding: 24px;
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }
    
    /* Scrollbar personalizada */
    .asistente-body::-webkit-scrollbar {
      width: 5px;
    }
    .asistente-body::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    .asistente-body::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #00d4ff, #c084fc);
      border-radius: 10px;
    }
    
    /* Barra de progreso */
    .progress-bar {
      margin-bottom: 28px;
    }
    
    .progress-track {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      height: 6px;
      overflow: hidden;
    }
    
    .progress-fill {
      background: linear-gradient(90deg, #00d4ff, #c084fc);
      width: 0%;
      height: 100%;
      border-radius: 20px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    
    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: -2px;
      width: 8px;
      height: 10px;
      background: #00d4ff;
      border-radius: 50%;
      box-shadow: 0 0 8px #00d4ff;
    }
    
    .progress-text {
      font-size: 0.7rem;
      color: #8b9dff;
      margin-top: 10px;
      text-align: right;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    
    /* Preguntas */
    .question {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 24px;
      color: #00d4ff;
      animation: fadeInUp 0.4s ease;
      letter-spacing: -0.2px;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Opciones */
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .option {
      background: rgba(22, 22, 36, 0.8);
      border: 1px solid rgba(0, 212, 255, 0.12);
      border-radius: 20px;
      padding: 14px 18px;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(4px);
    }
    
    .option:hover {
      border-color: #00d4ff;
      transform: translateX(6px);
      background: rgba(0, 212, 255, 0.08);
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.1);
    }
    
    .option-label {
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .option-desc {
      font-size: 0.7rem;
      color: #9ca3ff;
      margin-top: 8px;
      display: block;
      padding-left: 28px;
    }
    
    /* Inputs */
    .text-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(22, 22, 36, 0.8);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 24px;
      color: #e0e6ff;
      font-size: 0.9rem;
      margin-bottom: 20px;
      transition: all 0.2s ease;
      resize: vertical;
      font-family: inherit;
    }
    
    .text-input:focus {
      outline: none;
      border-color: #00d4ff;
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
    }
    
    /* Botones */
    .btn-next, .btn-back {
      background: linear-gradient(135deg, #00d4ff, #8b5cf6);
      border: none;
      border-radius: 60px;
      padding: 12px 20px;
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.25s ease;
      width: 100%;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }
    
    .btn-next::before, .btn-back::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    
    .btn-next:hover::before, .btn-back:hover::before {
      left: 100%;
    }
    
    .btn-back {
      background: transparent;
      border: 1px solid rgba(0, 212, 255, 0.4);
      color: #00d4ff;
    }
    
    .btn-next:hover, .btn-back:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.25);
    }
    
    .btn-next:active, .btn-back:active {
      transform: translateY(0);
    }
    
    /* Resultado */
    .result-card {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(20, 20, 35, 0.95));
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
      border: 1px solid rgba(0, 212, 255, 0.2);
      animation: fadeInUp 0.4s ease;
    }
    
    .result-card img {
      max-width: 100%;
      border-radius: 16px;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .result-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #00d4ff, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .result-description {
      font-size: 0.85rem;
      color: #a0aec0;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    
    .result-benefits {
      text-align: left;
      margin: 16px 0;
      padding-left: 20px;
      list-style: none;
    }
    
    .result-benefits li {
      margin-bottom: 8px;
      color: #e2e8f0;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .result-benefits li::before {
      content: "✨";
      font-size: 0.8rem;
    }
    
    .result-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }
    
    .btn-wa, .btn-quote, .btn-demo {
      display: block;
      text-align: center;
      text-decoration: none;
      padding: 12px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }
    
    .btn-wa {
      background: linear-gradient(135deg, #25d366, #128c7e);
      color: white;
    }
    
    .btn-wa:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(37, 211, 102, 0.3);
    }
    
    .btn-quote {
      background: linear-gradient(135deg, #00d4ff, #8b5cf6);
      color: white;
    }
    
    .btn-quote:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
    }
    
    .btn-demo {
      background: transparent;
      border: 1px solid #00d4ff;
      color: #00d4ff;
    }
    
    .btn-demo:hover {
      background: rgba(0, 212, 255, 0.1);
      transform: translateY(-2px);
    }
    
    /* Lead form */
    .lead-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .lead-form input {
      background: rgba(22, 22, 36, 0.8);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 24px;
      padding: 12px 16px;
      color: #e0e6ff;
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }
    
    .lead-form input:focus {
      outline: none;
      border-color: #00d4ff;
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
    }
    
    /* Toast */
    .toast-message {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      border: 1px solid #00d4ff;
      border-radius: 60px;
      padding: 8px 20px;
      color: #00d4ff;
      font-size: 0.75rem;
      font-weight: 500;
      z-index: 100;
      animation: fadeInUp 0.3s ease;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }
    
    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, #1a1a2e 25%, #2a2a3e 50%, #1a1a2e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 16px;
    }
    
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Responsive */
    @media (max-width: 600px) {
      .asistente-header { padding: 16px 20px; }
      .asistente-header h2 { font-size: 1.2rem; }
      .asistente-body { padding: 20px; }
      .question { font-size: 1.1rem; }
      .option { padding: 10px 14px; }
      .option-label { font-size: 0.85rem; }
      .btn-next, .btn-back { padding: 10px 16px; font-size: 0.8rem; }
      .toast-message { white-space: normal; text-align: center; max-width: 80%; font-size: 0.7rem; }
      .result-title { font-size: 1.1rem; }
      .result-benefits li { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
<div class="asistente-container">
  <div class="asistente-header">
    <h2>🤖 Asesor Ciborg 347</h2>
    <p>Te ayudo a encontrar la solución perfecta</p>
  </div>
  <div class="asistente-body" id="asistenteBody">
    <div style="text-align: center; padding: 40px;">
      <div class="skeleton" style="height: 50px; width: 80%; margin: 0 auto 20px;"></div>
      <div class="skeleton" style="height: 45px; width: 90%; margin: 0 auto 10px;"></div>
      <div class="skeleton" style="height: 45px; width: 85%; margin: 0 auto;"></div>
    </div>
  </div>
</div>

<script>
  // ========== CONFIGURACIÓN ==========
  const DEFAULT_WA = "5491164499481";
  let currentStep = "welcome";
  let userAnswers = {};
  let historyStack = [];
  let leadData = {};
  
  function showToast(message, isError = false) {
    const existingToast = document.querySelector('.toast-message');
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.textContent = message;
    toast.style.borderColor = isError ? '#ef4444' : '#00d4ff';
    toast.style.color = isError ? '#ef4444' : '#00d4ff';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  function saveToLocalStorage() {
    localStorage.setItem('ciborg_asistente', JSON.stringify({ userAnswers, currentStep, historyStack, timestamp: Date.now() }));
  }
  
  function clearLocalStorage() {
    localStorage.removeItem('ciborg_asistente');
  }
  
  function scrollToTop() {
    document.querySelector('.asistente-body')?.scrollTo({ top: 0, behavior: 'smooth' });
  }
  
  function updateProgress(percent) {
    const fill = document.querySelector('.progress-fill');
    if (fill) fill.style.width = percent + '%';
  }
  
  // ========== BIENVENIDA ==========
  function showWelcome() {
    currentStep = "welcome";
    clearLocalStorage();
    const body = document.getElementById('asistenteBody');
    body.innerHTML = `
      <div style="text-align: center; animation: fadeInUp 0.4s ease;">
        <div style="font-size: 3rem; margin-bottom: 12px;">👋</div>
        <div class="question" style="margin-bottom: 10px;">¡Hola! Soy el asistente de Ciborg 347.</div>
        <p style="color: #9ca3ff; margin-bottom: 16px; line-height: 1.5; font-size: 0.85rem;">Voy a ayudarte a encontrar la mejor solución para tu proyecto.</p>
        <p style="font-size: 0.75rem; color: #6b7280; margin-bottom: 24px;">Si tu caso requiere algo especial, podrás hablar directamente con Martín.</p>
        <button class="btn-next" id="startBtn">✨ Comenzar asesoría →</button>
      </div>
    `;
    document.getElementById('startBtn')?.addEventListener('click', () => {
      historyStack = [];
      userAnswers = {};
      currentStep = "q1";
      showQuestion1();
    });
    updateProgress(0);
    scrollToTop();
  }
  
  // ========== PREGUNTA 1 ==========
  function showQuestion1() {
    currentStep = "q1";
    const body = document.getElementById('asistenteBody');
    body.innerHTML = `
      <div class="progress-bar"><div class="progress-track"><div class="progress-fill" style="width: 10%;"></div></div><div class="progress-text">Paso 1 · ¿Cuál es tu objetivo?</div></div>
      <div class="question">🎯 ¿Cuál es tu principal objetivo?</div>
      <div class="options">
        <div class="option" data-value="conseguir_clientes"><span class="option-label">🎯 Conseguir más clientes</span><span class="option-desc">Atraer y captar nuevos clientes para tu negocio</span></div>
        <div class="option" data-value="mostrar_servicios"><span class="option-label">📋 Mostrar mis servicios</span><span class="option-desc">Exhibir lo que ofreces de forma profesional</span></div>
        <div class="option" data-value="vender_productos"><span class="option-label">🛒 Vender productos</span><span class="option-desc">Comercializar productos físicos o digitales</span></div>
        <div class="option" data-value="automatizar"><span class="option-label">⚙️ Automatizar procesos</span><span class="option-desc">Optimizar tareas repetitivas</span></div>
        <div class="option" data-value="presencia"><span class="option-label">🏢 Presencia profesional</span><span class="option-desc">Tener presencia online confiable</span></div>
        <div class="option" data-value="no_seguro"><span class="option-label">🤔 No estoy seguro</span><span class="option-desc">Necesito orientación para decidir</span></div>
        <div class="option" data-value="diferente"><span class="option-label">✏️ Mi caso es diferente</span><span class="option-desc">Proyecto personalizado</span></div>
      </div>
      <button class="btn-back" id="backBtn">← Volver al inicio</button>
    `;
    
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        const value = opt.dataset.value;
        userAnswers.q1 = value;
        historyStack.push({ step: currentStep, answer: value });
        saveToLocalStorage();
        
        if (value === 'conseguir_clientes') showConseguirClientes1();
        else if (value === 'mostrar_servicios') showMostrarServicios1();
        else if (value === 'vender_productos') showVenderProductos1();
        else if (value === 'automatizar') showAutomatizar1();
        else if (value === 'presencia') showPresencia1();
        else if (value === 'no_seguro') showNoSeguro1();
        else if (value === 'diferente') showCasoDiferente();
      });
    });
    
    document.getElementById('backBtn')?.addEventListener('click', () => {
      historyStack = [];
      userAnswers = {};
      showWelcome();
    });
    updateProgress(10);
    scrollToTop();
  }
  
  // ========== RAMA A ==========
  function showConseguirClientes1() {
    currentStep = "conseguir1";
    const body = document.getElementById('asistenteBody');
    body.innerHTML = `
      <div class="progress-bar"><div class="progress-track"><div class="progress-fill" style="width: 25%;"></div></div><div class="progress-text">Paso 2 · ¿Cómo conseguís clientes?</div></div>
      <div class="question">📢 ¿Cómo conseguís clientes actualmente?</div>
      <div class="options">
        <div class="option" data-value="redes"><span class="option-label">📱 Redes sociales</span><span class="option-desc">Instagram, Facebook, LinkedIn</span></div>
        <div class="option" data-value="recomendaciones"><span class="option-label">🗣️ Recomendaciones</span><span class="option-desc">Boca a boca</span></div>
        <div class="option" data-value="publicidad"><span class="option-label">📢 Publicidad</span><span class="option-desc">Google Ads, Facebook Ads</span></div>
        <div class="option" data-value="pocos"><span class="option-label">⚠️ No consigo muchos clientes</span><span class="option-desc">Me cuesta captar</span></div>
      </div>
      <button class="btn-back" id="backBtn">← Volver</button>
    `;
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        userAnswers.conseguir_como = opt.dataset.value;
        saveToLocalStorage();
        showConseguirClientes2();
      });
    });
    document.getElementById('backBtn')?.addEventListener('click', () => showQuestion1());
    updateProgress(25);
    scrollToTop();
  }
  
  function showConseguirClientes2() {
    currentStep = "conseguir2";
    const body = document.getElementById('asistenteBody');
    body.innerHTML = `
      <div class="progress-bar"><div class="progress-track"><div class="progress-fill" style="width: 40%;"></div></div><div class="progress-text">Paso 3 · ¿Ya tenés sitio web?</div></div>
      <div class="question">🌐 ¿Ya tenés sitio web?</div>
      <div class="options">
        <div class="option" data-value="si"><span class="option-label">✅ Sí</span><span class="option-desc">Ya tengo web</span></div>
        <div class="option" data-value="no"><span class="option-label">❌ No</span><span class="option-desc">Aún no tengo</span></div>
        <div class="option" data-value="viejo"><span class="option-label">🕰️ Tengo uno muy viejo</span><span class="option-desc">Necesito actualizar</span></div>
      </div>
      <button class="btn-back" id="backBtn">← Volver</button>
    `;
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        userAnswers.conseguir_tiene_web = opt.dataset.value;
        saveToLocalStorage();
        showConseguirClientes3();
      });
    });
    document.getElementById('backBtn')?.addEventListener('click', () => showConseguirClientes1());
    updateProgress(40);
    scrollToTop();
  }
  
  function showConseguirClientes3() {
    currentStep = "conseguir3";
    const body = document.getElementById('asistenteBody');
    body.innerHTML = `
      <div class="progress-bar"><div class="progress-track"><div class="progress-fill" style="width: 55%;"></div></div><div class="progress-text">Paso 4 · Preferencias de contacto</div></div>
      <div class="question">💬 ¿Querés recibir consultas por WhatsApp?</div>
      <div class="options">
        <div class="option" data-value="si"><span class="option-label">✅ Sí</span><span class="option-desc">Quiero que me contacten por WhatsApp</span></div>
        <div class="option" data-value="no"><span class="option-label">❌ No</span><span class="option-desc">Solo por formulario</span></div>
        <div class="option" data-value="ambos"><span class="option-label">📱 Ambos</span><span class="option-desc">WhatsApp y formulario</span></div>
      </div>
      <button class="btn-back" id="backBtn">← Volver</button>
    `;
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        userAnswers.conseguir_whatsapp = opt.dataset.value;
        saveToLocalStorage();
        showLeadCapture();
      });
    });
    document.getElementById('backBtn')?.addEventListener('click', () => showConseguirClientes2());
    updateProgress(55);
    scrollToTop();
  }
  
  // ========== RAMA B ==========
  function showMostrarServicios1() {
    currentStep = "mostrar1";
    const body = document.getElementById('asistenteBody');
    body.innerHTML = `
      <div class="progress-bar"><div class="progress-track"><div class="progress-fill" style="width: 25%;"></div></div><div class="progress-text">Paso 2 · Tipo de actividad</div></div>
      <div class="question">👤 ¿Qué tipo de actividad tenés?</div>
      <div class="options">
        <div class="option" data-value="independiente"><span class="option-label">👤 Profesional independiente</span><span class="option-desc">Médico, abogado, contador, etc.</span></div>
        <div class="option" data-value="consultorio"><span class="option-label">🏥 Consultorio</span><span class="option-desc">Consultorio médico, odontológico</span></div>
        <div class="option" data-value="empresa"><span class="option-label">🏢 Empresa</span><span class="option-desc">PYME, corporación</span></div>
        <div class="option" data-value="emprendimiento"><span class="option-label">🚀 Emprendimiento</span><span class="option-desc">Negocio en crecimiento</span></div>
      </div>
      <button class="btn-back" id="backBtn">← Volver</button>
    `;
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        userAnswers.mostrar_tipo = opt.dataset.value;
        saveToLocalStorage();
        showMostrarServicios2();
      });
    });
    document.getElementById('backBtn')?.addEventListener('click', () => showQuestion1());
    updateProgress(25);
    scrollToTop();
  }
  
  function showMostrarServicios2() {
    currentStep = "mostrar2";
    const body = document.getElementById('asistenteBody');
    body.innerHTML = `
      <div class="progress-bar"><div class="progress-track"><div class="progress-fill" style="width: 40%;"></div></div><div class="progress-text">Paso 3 · Cantidad de servicios</div></div>
